<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA fallback: redirect to index.html preserving the path
    var path = window.location.pathname || '/';
    var search = window.location.search;
    window.location.replace('/?redirect=' + encodeURIComponent(path + search));
  </script>
</head>
<body></body>
</html>
